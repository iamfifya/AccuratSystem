name: Accurat System CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        configuration: [Release]

    runs-on: windows-latest 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' 

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    # 4. Скачиваем пакеты в корневую папку (для тех библиотек, что ищут путь "..\packages")
    - name: Restore NuGet Packages (WPF)
      run: nuget restore AccuratPanelCarWashing\AccuratPanelCarWashing.csproj -PackagesDirectory packages

    # 🔥 4.1 ВОТ НАШ ФИКС: Копируем скачанные пакеты внутрь проекта
    # (для тех библиотек, что ищут путь "packages\" внутри проекта, например MaterialDesign)
    - name: Fix broken CSPROJ paths
      run: |
        New-Item -ItemType Directory -Force -Path AccuratPanelCarWashing\packages
        Copy-Item -Path packages\* -Destination AccuratPanelCarWashing\packages -Recurse -Force

    - name: Restore .NET Packages (API)
      run: dotnet restore Akkurat.WebAPI\Accurat.WebAPI.csproj

    - name: Build Web API
      run: dotnet build Akkurat.WebAPI\Accurat.WebAPI.csproj --configuration ${{ matrix.configuration }} --no-restore

    - name: Build WPF Client
      run: msbuild AccuratPanelCarWashing\AccuratPanelCarWashing.csproj /p:Configuration=${{ matrix.configuration }}

    - name: Upload WPF Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Accurat-Client-Release
        path: AccuratPanelCarWashing\bin\${{ matrix.configuration }}\